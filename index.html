<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>스스로 옷 입기 도우미</title>

    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="icon-192.png">
    <link rel="apple-touch-icon" href="icon-192.png">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="옷입기도우미">

    <style>
        :root { --success-bg: #d4edda; --error-bg: #f8d7da; --normal-bg: #f0f2f5; --primary-color: #4CAF50; }
        body { font-family: 'Pretendard', sans-serif; text-align: center; margin: 0; background-color: var(--normal-bg); transition: background 0.4s ease; }
        
        #splash-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #ffffff; z-index: 9999; display: flex; justify-content: center; align-items: center; transition: opacity 0.8s ease; }
        #splash-screen img { width: 100%; height: 100%; object-fit: cover; }
        
        .screen { display: none; padding: 20px; animation: fadeIn 0.5s; }
        .active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        #webcam-container { position: relative; display: inline-block; margin: 20px auto; border-radius: 25px; overflow: hidden; border: 6px solid #fff; box-shadow: 0 8px 25px rgba(0,0,0,0.15); background: #000; }
        #webcam-container canvas { display: block; transform: none; max-width: 100%; }
        .guide-overlay { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 70%; height: 70%; border: 4px dashed rgba(255, 255, 255, 0.5); border-radius: 15px; pointer-events: none; }
        
        #result-area { margin-top: 15px; min-height: 180px; }
        #emoji { font-size: 90px; display: block; }
        #resultText { font-size: 28px; font-weight: bold; margin-top: 10px; }
        
        button { font-size: 20px; padding: 18px; border: none; border-radius: 12px; cursor: pointer; width: 85%; font-weight: bold; margin: 10px; transition: transform 0.1s; }
        button:active { transform: scale(0.98); }
        .btn-student { background: var(--primary-color); color: white; }
        .btn-back { background: #9e9e9e; color: white; }
        .pop { animation: pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes pop { 0% { transform: scale(0.6); } 100% { transform: scale(1); } }
    </style>
</head>
<body>

    <div id="splash-screen"><img src="intro.png" alt="제59회 충청남도교육자료전"></div>
    <header><h1>👕 스스로 옷 입기 도우미</h1></header>

    <div id="home" class="screen active">
        <button class="btn-student" onclick="showPage('student')">👦 학생용 실행하기</button>
    </div>

    <div id="student" class="screen">
        <div id="webcam-container">
            <div class="guide-overlay"></div>
            <div id="webcam-viewer"></div>
        </div>
        <div id="result-area">
            <span id="emoji">🙂</span>
            <div id="resultText">카메라를 준비 중입니다...</div>
        </div>
        <button class="btn-back" onclick="location.reload()">처음으로 돌아가기</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>

    <script>
        const MODEL_URL = "https://teachablemachine.withgoogle.com/models/WMkucO1Ey/";
        let model, webcam, lastState = "", count = 0;

        function speak(text) { window.speechSynthesis.cancel(); const msg = new SpeechSynthesisUtterance(text); msg.lang = 'ko-KR'; window.speechSynthesis.speak(msg); }
        function showPage(id) { 
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(id === 'student') init();
        }

        window.addEventListener('load', () => setTimeout(() => document.getElementById('splash-screen').style.opacity = '0', 2000));
        
        async function init() {
            model = await tmImage.load(MODEL_URL + "model.json", MODEL_URL + "metadata.json");
            webcam = new tmImage.Webcam(500, 500, true); 
            await webcam.setup(); await webcam.play();
            document.getElementById("webcam-viewer").appendChild(webcam.canvas);
            speak("준비되었습니다. 사각형 안에 옷을 보여주세요.");
            window.requestAnimationFrame(loop);
        }

        async function loop() { webcam.update(); await predict(); window.requestAnimationFrame(loop); }

        async function predict() {
            const pred = await model.predict(webcam.canvas);
            const best = pred.reduce((p, c) => (p.probability > c.probability) ? p : c);
            if(best.probability > 0.85) updateResult(best.className);
        }

        function updateResult(state) {
            if (lastState === state) return;
            const emojiEl = document.getElementById("emoji"), textEl = document.getElementById("resultText");
            emojiEl.classList.remove("pop"); void emojiEl.offsetWidth;
            
            if (state === "앞") {
                document.body.style.background = "var(--success-bg)";
                emojiEl.innerText = "👍"; textEl.innerText = "바르게 잘 입었어요!";
                speak("바르게 입었습니다.");
            } else {
                document.body.style.background = "var(--error-bg)";
                emojiEl.innerText = "❌"; textEl.innerText = "옷이 뒤집혔어요!";
                speak("옷이 뒤집어진 것 같아요.");
            }
            emojiEl.classList.add("pop"); lastState = state;
        }
    </script>
</body>
</html>
